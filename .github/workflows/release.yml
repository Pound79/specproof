name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      # Publish gate: never ship when the npm packages and the Claude Code plugin
      # manifests disagree on version. scripts/release.sh keeps them in lockstep,
      # but a manual/out-of-script `v*` tag push reaches this workflow directly —
      # this check stops it from publishing a drifted state (the bug #13 fixes).
      - run: npm run check:versions
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Publish @pound79/specproof-traceability
        run: |
          PKG_VERSION=$(node -p "require('./packages/traceability/package.json').version")
          if npm view @pound79/specproof-traceability@"$PKG_VERSION" version 2>/dev/null; then
            echo "::notice::@pound79/specproof-traceability@$PKG_VERSION already published — skipping"
          else
            npm publish --workspace packages/traceability --provenance
          fi
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
      - name: Publish @pound79/specproof
        run: |
          PKG_VERSION=$(node -p "require('./cli/package.json').version")
          if npm view @pound79/specproof@"$PKG_VERSION" version 2>/dev/null; then
            echo "::notice::@pound79/specproof@$PKG_VERSION already published — skipping"
          else
            npm publish --workspace cli --provenance
          fi
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
