name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Publish @pound79/bdd-traceability
        run: |
          PKG_VERSION=$(node -p "require('./packages/traceability/package.json').version")
          if npm view @pound79/bdd-traceability@"$PKG_VERSION" version 2>/dev/null; then
            echo "::notice::@pound79/bdd-traceability@$PKG_VERSION already published — skipping"
          else
            npm publish --workspace packages/traceability --provenance
          fi
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
      - name: Publish @pound79/bdd-kit
        run: |
          PKG_VERSION=$(node -p "require('./cli/package.json').version")
          if npm view @pound79/bdd-kit@"$PKG_VERSION" version 2>/dev/null; then
            echo "::notice::@pound79/bdd-kit@$PKG_VERSION already published — skipping"
          else
            npm publish --workspace cli --provenance
          fi
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
